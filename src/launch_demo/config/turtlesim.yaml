# 单独运行 param_yaml.launch.py 时使用（namespace=turtlesim2）
/turtlesim2/sim_node:
  ros__parameters:
    background_r: 0
    background_g: 0
    background_b: 0

# 被 launch_include.launch.py 的 sim1 分组 include 后的完整节点路径
# 红色背景
/sim1/turtlesim2/sim_node:
  ros__parameters:
    background_r: 255
    background_g: 0
    background_b: 0

# 被 launch_include.launch.py 的 sim2 分组 include 后的完整节点路径
# 绿色背景
/sim2/turtlesim2/sim_node:
  ros__parameters:
    background_r: 0
    background_g: 180
    background_b: 0
